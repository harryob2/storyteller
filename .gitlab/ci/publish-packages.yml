.publish-align-sea-base:
  stage: publish
  rules:
    - if:
        '$CI_COMMIT_TAG =~
        /^align-v?\d+\.\d+\.\d+(?:-(?:alpha|beta|rc|experimental|dev|test|preview)(?:\.\d+)?)?$/'
  script:
    - yarn workspaces focus @storyteller-platform/align
    - yarn workspace @storyteller-platform/align compile
    - |
      PACKAGE_ID=$(curl -s --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=stalign&package_version=${CI_COMMIT_TAG}" \
        | jq -r '.[0].id // empty')
      if [ -n "$PACKAGE_ID" ]; then
        FILE_IDS=$(curl -s --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${PACKAGE_ID}/package_files" \
          | jq -r ".[] | select(.file_name == \"stalign-${VARIANT}\") | .id")
        for FILE_ID in $FILE_IDS; do
          echo "Deleting file ID: $FILE_ID"
          curl -s --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${PACKAGE_ID}/package_files/${FILE_ID}"
        done
      fi
    - echo "Uploading to GitLab Generic Package Registry..."
    - VERSION_PARTS=($(echo "$CI_COMMIT_TAG" | tr 'v' ' '))
    - echo v${VERSION_PARTS[1]}
    - |
      curl --fail-with-body --show-error \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file align/stalign \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/stalign/${VERSION_PARTS[1]}/stalign-${VARIANT}"

publish-align-sea-darwin-arm64:
  extends: .publish-align-sea-base
  tags: [saas-macos-medium-m1]
  variables:
    VARIANT: "darwin-arm64"
  before_script:
    - brew install curl
    - export NVM_DIR="$HOME/.nvm"
    - source "$NVM_DIR/nvm.sh"
    - nvm install 25
    - nvm use 25
    - nvm alias default 25
    - npm i -g yarn

publish-align-sea-linux-x64:
  image: node:25
  extends: .publish-align-sea-base
  variables:
    VARIANT: "linux-x64"
  before_script:
    - apt update
    - DEBIAN_FRONTEND=noninteractive apt install -y jq

